name: Release

on:
  push:
    tags:
      - v*

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python environment
        uses: ./.github/actions/setup-python

      - name: Get Version
        id: version
        run: |
          echo "VERSION=$(pdm show --version)" >> $GITHUB_OUTPUT
          echo "TAG_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Check Version
        if: steps.version.outputs.VERSION != steps.version.outputs.TAG_VERSION
        run: exit 1

      - name: Generate Release Notes
        run: |
          python tools/release_notes.py \
            --current-tag "${{ steps.version.outputs.TAG_NAME }}" \
            --repo "${{ github.repository }}" \
            --output release-notes.md

      - name: Publish Package
        run: |
          pdm publish
          gh release view "${{ steps.version.outputs.TAG_NAME }}" >/dev/null 2>&1 || \
            gh release create "${{ steps.version.outputs.TAG_NAME }}" \
              --title "${{ steps.version.outputs.TAG_NAME }}" \
              --notes-file release-notes.md
          gh release edit "${{ steps.version.outputs.TAG_NAME }}" \
            --title "${{ steps.version.outputs.TAG_NAME }}" \
            --notes-file release-notes.md
          gh release upload --clobber ${{ steps.version.outputs.TAG_NAME }} dist/*.tar.gz dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
